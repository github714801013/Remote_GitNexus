services:
  # ─── Zoekt 全文索引服务 ────────────────────────────────────────────────────────
  zoekt-indexserver:
    image: sourcegraph/zoekt-indexserver:latest
    container_name: zoekt-indexserver
    volumes:
      - /home/ji99/gitnexus:/repos:ro
      - zoekt-index:/data/index
    entrypoint:
      - sh
      - -c
      - |
        INDEX_DIR=/data/index
        TRIGGER_DIR=/data/index/triggers
        REPOS_DIR=/repos
        mkdir -p "$$TRIGGER_DIR"

        index_repo() {
          repo_dir="$$1"
          repo_name=$$(echo "$$repo_dir" | sed "s|$${REPOS_DIR}/||")
          zoekt-git-index -index "$$INDEX_DIR" -name "$$repo_name" "$$repo_dir" 2>/dev/null || true
        }

        # 启动时全量索引
        find "$$REPOS_DIR" -maxdepth 3 -name HEAD -path "*/.git/HEAD" | while read h; do
          index_repo "$$(dirname $$(dirname "$$h"))"
        done

        # 持续监听触发文件，每 30 分钟兜底全量扫描
        last_full=$$(date +%s)
        while true; do
          find "$$TRIGGER_DIR" -maxdepth 1 -name "*.reindex" | while read t; do
            repo_name=$$(basename "$$t" .reindex | tr '_' '/')
            repo_dir="$$REPOS_DIR/$$repo_name"
            rm -f "$$t"
            [ -d "$$repo_dir/.git" ] && index_repo "$$repo_dir"
          done
          now=$$(date +%s)
          if [ $$((now - last_full)) -ge 1800 ]; then
            find "$$REPOS_DIR" -maxdepth 3 -name HEAD -path "*/.git/HEAD" | while read h; do
              index_repo "$$(dirname $$(dirname "$$h"))"
            done
            last_full=$$now
          fi
          sleep 5
        done
    restart: always

  zoekt-webserver:
    image: sourcegraph/zoekt-webserver:latest
    container_name: zoekt-webserver
    ports:
      - '6070:6070'
    volumes:
      - zoekt-index:/data/index:ro
    environment:
      - DATA_DIR=/data/index
    depends_on:
      - zoekt-indexserver
    restart: always

  # ─── GitNexus MCP 代理 ────────────────────────────────────────────────────────
  gitnexus-mcp-proxy:
    image: gitnexus-mcp-proxy:latest
    container_name: gitnexus-mcp-proxy
    ports:
      - '1347:1347'
      - '1348:1348'
      - '1349:1349'
      - '1350:1350'
    volumes:
      - /home/ji99/gitnexus:/projects
      - /home/ji99/Project/mcp_gitnexus_server/models:/app/models
      - /home/ji99/.gitnexus:/root/.gitnexus
      - /home/ji99/.lbdb:/root/.lbdb
      - zoekt-index:/data/zoekt-index
    environment:
      - GITEA_TOKEN=${GITEA_TOKEN}
      - INDEXING_CONCURRENCY=3
      - GITNEXUS_EMBEDDING_URL=http://10.1.14.177:8001/v1
      - GITNEXUS_INDEX_EMBEDDING_URL=http://10.1.14.177:8002/v1
      - GITNEXUS_EMBEDDING_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - GITNEXUS_EMBEDDING_DIMS=1536
      - GITNEXUS_EMBEDDING_TIMEOUT_MS=3600000
      - GITNEXUS_EMBEDDING_BATCH_SIZE=${GITNEXUS_EMBEDDING_BATCH_SIZE:-1}
      - GITNEXUS_WORKER_SUB_BATCH_TIMEOUT_MS=3600000
      - GITNEXUS_MAX_FILE_SIZE_BYTES=5242880
      - GITNEXUS_MAX_PROCESSES=1000
      - GITNEXUS_EMBEDDING_LIMIT=20000000
      - GITNEXUS_ALLOW_REMOTE_MODELS=true
      - ZOEKT_ENDPOINTS=http://zoekt-webserver:6070
      - ZOEKT_TRIGGER_DIR=/data/zoekt-index/triggers
    depends_on:
      - zoekt-webserver
    stop_grace_period: 5m
    restart: always

volumes:
  zoekt-index:
    driver: local

networks:
  default:
    name: gitnexus-network
