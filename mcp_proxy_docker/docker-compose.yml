services:
  # ─── Zoekt 全文索引服务 ────────────────────────────────────────────────────────
  zoekt-indexserver:
    image: sourcegraph/zoekt-indexserver:latest
    container_name: zoekt-indexserver
    volumes:
      - /home/ji99/gitnexus:/repos:ro
      - zoekt-index:/data/index
    entrypoint:
      - sh
      - -c
      - |
        INDEX_DIR=/data/index
        TRIGGER_DIR=/data/index/triggers
        REPOS_DIR=/repos
        mkdir -p "$$TRIGGER_DIR"

        index_repo() {
          repo_dir="$$1"
          zoekt-git-index -index "$$INDEX_DIR" "$$repo_dir" 2>/dev/null || true
        }

        # 清理已删除仓库的孤立 shard：shard 文件名含 URL 编码路径，
        # 从 shard 名反推仓库路径，若目录不存在则删除对应 shard
        prune_deleted_repos() {
          for shard in "$$INDEX_DIR"/*.zoekt; do
            [ -f "$$shard" ] || continue
            # shard 文件名格式: <url-encoded-repo-path>_v<N>.<seq>.zoekt
            encoded=$$(basename "$$shard" | sed 's/_v[0-9]*\.[0-9]*.zoekt$$//')
            # URL 解码（%2F -> /）
            repo_path=$$(printf '%b' "$$(echo "$$encoded" | sed 's/%/\\x/g')")
            # repo_path 形如 code.9ji.com/group/repo，取最后两段作为本地路径
            local_rel=$$(echo "$$repo_path" | sed 's|^[^/]*/||')
            if [ -n "$$local_rel" ] && [ ! -d "$$REPOS_DIR/$$local_rel/.git" ]; then
              rm -f "$$shard"
            fi
          done
        }

        # 启动时：先清理孤立 shard，再全量索引
        prune_deleted_repos
        find "$$REPOS_DIR" -maxdepth 4 -name HEAD -path "*/.git/HEAD" | while read h; do
          index_repo "$$(dirname $$(dirname "$$h"))"
        done

        # 持续监听触发文件，每 30 分钟兜底全量扫描 + 清理
        last_full=$$(date +%s)
        while true; do
          find "$$TRIGGER_DIR" -maxdepth 1 -name "*.reindex" | while read t; do
            repo_name=$$(basename "$$t" .reindex | tr '_' '/')
            repo_dir="$$REPOS_DIR/$$repo_name"
            rm -f "$$t"
            [ -d "$$repo_dir/.git" ] && index_repo "$$repo_dir"
          done
          now=$$(date +%s)
          if [ $$((now - last_full)) -ge 1800 ]; then
            prune_deleted_repos
            find "$$REPOS_DIR" -maxdepth 4 -name HEAD -path "*/.git/HEAD" | while read h; do
              index_repo "$$(dirname $$(dirname "$$h"))"
            done
            last_full=$$now
          fi
          sleep 5
        done
    restart: always

  zoekt-webserver:
    image: sourcegraph/zoekt-webserver:latest
    container_name: zoekt-webserver
    command: ['zoekt-webserver', '-listen', ':6070', '-index', '/data/index', '-rpc', '-html']
    ports:
      - '6070:6070'
    volumes:
      - zoekt-index:/data/index:ro
    environment:
      - DATA_DIR=/data/index
    depends_on:
      - zoekt-indexserver
    restart: always

  # ─── Neo4j 单库图及向量索引存储 ──────────────────────────────────────────────
  neo4j:
    image: neo4j:2026.04.0
    container_name: gitnexus-neo4j
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=${GITNEXUS_NEO4J_USER:-neo4j}/${GITNEXUS_NEO4J_PASSWORD:-gitnexus}
      - NEO4J_server_memory_heap_initial__size=${GITNEXUS_NEO4J_HEAP_INITIAL:-2G}
      - NEO4J_server_memory_heap_max__size=${GITNEXUS_NEO4J_HEAP_MAX:-8G}
      - NEO4J_server_memory_pagecache_size=${GITNEXUS_NEO4J_PAGECACHE:-4G}
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'cypher-shell -u ${GITNEXUS_NEO4J_USER:-neo4j} -p ${GITNEXUS_NEO4J_PASSWORD:-gitnexus} "RETURN 1"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─── GitNexus MCP 代理 ────────────────────────────────────────────────────────
  gitnexus-mcp-proxy:
    image: gitnexus-mcp-proxy:latest
    container_name: gitnexus-mcp-proxy
    ports:
      - '1347:1347'
      - '1350:1350'
    volumes:
      - /home/ji99/gitnexus:/projects
      - /home/ji99/Project/mcp_gitnexus_server/models:/app/models
      - /home/ji99/.gitnexus:/root/.gitnexus
      - /home/ji99/.lbdb:/root/.lbdb
      - zoekt-index:/data/zoekt-index
    environment:
      - NODE_OPTIONS=--max-old-space-size=32768
      - TZ=Asia/Shanghai
      - GITEA_TOKEN=${GITEA_TOKEN}
      - GITNEXUS_EMBEDDING_URL=http://10.1.14.177:8001/v1
      - GITNEXUS_INDEX_EMBEDDING_URL=http://10.1.14.177:8002/v1
      - GITNEXUS_EMBEDDING_MODEL=Alibaba-NLP/gte-Qwen2-1.5B-instruct
      - GITNEXUS_EMBEDDING_DIMS=1536
      - GITNEXUS_EMBEDDING_TIMEOUT_MS=3600000
      - GITNEXUS_EMBEDDING_BATCH_SIZE=${GITNEXUS_EMBEDDING_BATCH_SIZE:-1}
      - GITNEXUS_WORKER_SUB_BATCH_TIMEOUT_MS=3600000
      - GITNEXUS_WEBHOOK_ALLOWED_ENVS=dev,iteng
      - GITNEXUS_ANALYZE_MAX_OLD_SPACE_MB=${GITNEXUS_ANALYZE_MAX_OLD_SPACE_MB:-32768}
      - GITNEXUS_MAX_FILE_SIZE_BYTES=5242880
      - GITNEXUS_MAX_PROCESSES=1000
      - GITNEXUS_EMBEDDING_LIMIT=20000000
      - GITNEXUS_ALLOW_REMOTE_MODELS=true
      - GITNEXUS_PIPELINE_MEMORY_LOG=1
      - ZOEKT_ENDPOINTS=http://zoekt-webserver:6070
      - ZOEKT_TRIGGER_DIR=/data/zoekt-index/triggers
      - GITNEXUS_STORAGE_BACKEND=neo4j
      - GITNEXUS_NEO4J_URI=bolt://neo4j:7687
      - GITNEXUS_NEO4J_USER=${GITNEXUS_NEO4J_USER:-neo4j}
      - GITNEXUS_NEO4J_PASSWORD=${GITNEXUS_NEO4J_PASSWORD:-gitnexus}
      - GITNEXUS_NEO4J_DATABASE=${GITNEXUS_NEO4J_DATABASE:-neo4j}
    depends_on:
      zoekt-webserver:
        condition: service_started
      neo4j:
        condition: service_healthy
    stop_grace_period: 5m
    restart: always

volumes:
  zoekt-index:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local

networks:
  default:
    name: gitnexus-network
